<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gestor UTI"/>
<meta name="theme-color" content="#0f172a"/>
<title>Gestor UTI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;height:100dvh}
button,input,textarea{font-family:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}

/* HEADER */
#hdr{background:#1e293b;border-bottom:1px solid #334155;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#hdr svg{flex-shrink:0}
#hdr h1{font-size:15px;font-weight:700;color:#f8fafc;letter-spacing:-.3px}
#hdr .sp{flex:1}
#hdr .cnt{font-size:11px;color:#475569;white-space:nowrap}
.hbtn{background:#1e293b;border:1px solid #334155;border-radius:6px;color:#cbd5e1;padding:5px 9px;font-size:12px;font-weight:500;white-space:nowrap}
.hbtn.g{background:#0f766e;border-color:#0f766e;color:#fff}

/* BARS */
.bar{background:#1e293b;padding:7px 12px;border-bottom:1px solid #334155;display:flex;gap:8px;align-items:center;flex-shrink:0}
.bar.hidden,.hidden{display:none!important}
.bar label{font-size:12px;color:#94a3b8;white-space:nowrap}
.bar input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:5px 8px;font-size:12px;outline:none}
.bar input:focus{border-color:#38bdf8}
.bar button{background:#0f766e;border:none;border-radius:6px;color:#fff;padding:5px 10px;font-size:12px;font-weight:500}

/* EXPORT */
#expbar{background:#1e293b;padding:8px 12px;border-bottom:1px solid #334155}
#expbar.hidden{display:none}
.exptop{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.exptop span{font-size:12px;color:#94a3b8;flex:1}
#exptext{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px;font-size:11px;resize:none;outline:none;min-height:90px;max-height:160px;line-height:1.5}

/* ERROR */
#errbar{background:#7f1d1d;padding:6px 12px;font-size:12px;color:#fca5a5;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#errbar.hidden{display:none}
#errbar button{background:none;border:none;color:#fca5a5;font-size:18px;line-height:1;padding:0 2px}

/* BED TABS */
#btabs{display:flex;overflow-x:auto;background:#1e293b;border-bottom:1px solid #334155;flex-shrink:0;scrollbar-width:none}
#btabs::-webkit-scrollbar{display:none}
.bt{padding:8px 11px;font-size:12px;font-weight:500;color:#475569;display:flex;align-items:center;gap:4px;white-space:nowrap;background:none;border:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;flex-shrink:0}
.bt.act{color:#38bdf8;border-bottom-color:#38bdf8}
.bt.occ{color:#94a3b8}
.dot{width:7px;height:7px;border-radius:50%;background:#334155;display:inline-block;flex-shrink:0}
.dot.on{background:#22c55e}
.bdg{background:#dc2626;border-radius:10px;font-size:9px;padding:1px 5px;color:#fff;font-weight:600}

/* INFO BAR */
#ibar{background:#1e293b;border-bottom:1px solid #334155;padding:6px 10px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0}
#ibar input{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:5px 7px;font-size:12px;outline:none;min-width:0}
#ibar input:focus{border-color:#38bdf8}
#ibar input::placeholder{color:#475569}
.i-nm{width:130px}
.i-ag{width:48px}
.i-wt{width:58px}
.i-dx{flex:1;min-width:120px}
#btnalta{background:#dc2626;border:none;border-radius:6px;color:#fff;padding:5px 10px;font-size:12px;font-weight:600}

/* SUB TABS */
#stabs{display:flex;background:#0f172a;border-bottom:1px solid #1e293b;flex-shrink:0}
.st{padding:8px 16px;font-size:12px;font-weight:500;color:#64748b;background:none;border:none;border-bottom:2px solid transparent;transition:color .15s;flex:1;text-align:center}
.st.act{color:#38bdf8;border-bottom-color:#38bdf8}

/* MAIN CONTENT */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* QUICK BTNS */
#qrow{display:flex;gap:5px;padding:6px 10px;overflow-x:auto;background:#0f172a;flex-shrink:0;scrollbar-width:none}
#qrow::-webkit-scrollbar{display:none}
.qb{background:#1e293b;border:1px solid #2d3f55;border-radius:16px;color:#94a3b8;padding:5px 11px;font-size:11px;white-space:nowrap;transition:background .15s}
.qb:active{background:#334155}

/* CHAT */
#chatpanel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#chatarea{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.bubble{max-width:88%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word}
.bubble.u{align-self:flex-end;background:#1d4ed8;color:#fff;border-bottom-right-radius:4px}
.bubble.a{align-self:flex-start;background:#1e293b;color:#e2e8f0;border-bottom-left-radius:4px;white-space:pre-wrap}
.bubble img{max-width:100%;border-radius:8px;margin-bottom:6px;display:block}
.cpbtn{display:inline-flex;align-items:center;gap:4px;margin-top:7px;background:none;border:none;color:#64748b;font-size:11px;padding:0}
.cpbtn:active{color:#94a3b8}
.empty{color:#475569;font-size:13px;text-align:center;margin-top:40px;line-height:2;padding:0 20px}
.empty small{font-size:11px}

/* IMG PREVIEW */
#imgprev{padding:5px 12px;background:#1e293b;border-top:1px solid #334155;display:flex;align-items:center;gap:8px;flex-shrink:0}
#imgprev.hidden{display:none}
#previmg{height:38px;border-radius:5px;object-fit:cover}
#imgprev span{font-size:11px;color:#94a3b8;flex:1}
#imgprev button{background:none;border:none;color:#dc2626;font-size:18px;line-height:1;padding:2px}

/* INPUT ROW */
#inrow{display:flex;gap:6px;padding:8px 10px;background:#1e293b;border-top:1px solid #334155;align-items:flex-end;flex-shrink:0}
#msginp{flex:1;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;padding:8px 11px;font-size:13px;resize:none;outline:none;line-height:1.45;max-height:110px;min-height:38px}
#msginp:focus{border-color:#38bdf8}
.ib{border:none;border-radius:8px;color:#fff;padding:8px 10px;font-size:15px;line-height:1;flex-shrink:0}
.ib.grey{background:#0f172a;border:1px solid #334155}
.ib.blue{background:#1d4ed8;padding:8px 14px;font-size:13px;font-weight:600}
.ib.red{background:#dc2626}
.ib:disabled{opacity:.5;cursor:not-allowed}

/* PENDENCIES */
#pendpanel{flex:1;overflow-y:auto;padding:10px 12px;display:none;flex-direction:column;gap:0}
#padd{display:flex;gap:6px;margin-bottom:10px}
#padd input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:8px 10px;font-size:13px;outline:none}
#padd input:focus{border-color:#38bdf8}
#padd button{background:#1d4ed8;border:none;border-radius:8px;color:#fff;padding:8px 14px;font-size:12px;font-weight:600}
.pi{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#1e293b;border-radius:9px;margin-bottom:5px;transition:opacity .2s}
.pi.done{opacity:.45}
.pi input[type=checkbox]{accent-color:#38bdf8;width:17px;height:17px;cursor:pointer;flex-shrink:0}
.pi span{flex:1;font-size:13px;color:#e2e8f0;line-height:1.4}
.pi.done span{text-decoration:line-through;color:#64748b}
.pi button{background:none;border:none;color:#dc2626;font-size:17px;line-height:1;padding:2px;flex-shrink:0}
#pcnt{font-size:11px;color:#64748b;margin-top:4px;text-align:center}

/* EVOLUTION */
#evopanel{flex:1;display:none;flex-direction:column;padding:10px 12px;gap:8px;overflow:hidden}
#evobtns{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.eb{border:none;border-radius:7px;color:#fff;padding:7px 12px;font-size:12px;font-weight:600}
.eb.teal{background:#0f766e}
.eb.slate{background:#334155}
#evotxt{flex:1;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;padding:12px;font-size:13px;resize:none;outline:none;line-height:1.65;min-height:0}
#evotxt:focus{border-color:#38bdf8}

/* LOADING OVERLAY */
#loadbub{display:none;align-self:flex-start;background:#1e293b;color:#64748b;padding:9px 12px;border-radius:12px;border-bottom-left-radius:4px;font-size:13px}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2.2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
  <h1>Gestor UTI</h1>
  <span class="sp"></span>
  <span class="cnt" id="cnt">0/10</span>
  <button class="hbtn g" onclick="toggleExp()">📤 Turno</button>
  <button class="hbtn" onclick="toggleKey()">🔑 API</button>
</div>

<!-- API KEY BAR -->
<div class="bar hidden" id="keybar">
  <label>Chave OpenAI:</label>
  <input type="password" id="oaiinp" placeholder="sk-..." oninput="saveKey()"/>
  <button onclick="toggleKey()">OK</button>
</div>

<!-- EXPORT BAR -->
<div id="expbar" class="hidden">
  <div class="exptop">
    <span>Passagem de plantão</span>
    <button class="hbtn" onclick="copyExp()">📋 Copiar</button>
    <button class="hbtn" onclick="toggleExp()">✕</button>
  </div>
  <textarea id="exptext" readonly></textarea>
</div>

<!-- ERROR BAR -->
<div id="errbar" class="hidden">
  <span id="errmsg"></span>
  <button onclick="hideErr()">✕</button>
</div>

<!-- BED TABS -->
<div id="btabs"></div>

<!-- INFO BAR -->
<div id="ibar">
  <input class="i-nm" id="i-nm" placeholder="Paciente" oninput="upPat('name',this.value)"/>
  <input class="i-ag" id="i-ag" placeholder="Idade" oninput="upPat('age',this.value)"/>
  <input class="i-wt" id="i-wt" placeholder="Peso kg" oninput="upPat('weight',this.value)"/>
  <input class="i-dx" id="i-dx" placeholder="Diagnóstico principal" oninput="upPat('diagnosis',this.value)"/>
  <button id="btnalta" class="hidden" onclick="discharge()">Alta</button>
</div>

<!-- SUB TABS -->
<div id="stabs">
  <button class="st act" onclick="setTab('chat')">💬 Chat</button>
  <button class="st" onclick="setTab('pend')">📋 Pendências</button>
  <button class="st" onclick="setTab('evo')">📝 Evolução</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CHAT PANEL -->
  <div id="chatpanel">
    <div id="qrow">
      <button class="qb" onclick="qs('Com base no quadro do paciente, quais exames estão faltando e por quê? Justifique cada um.')">📋 Sugerir exames</button>
      <button class="qb" onclick="qs('Me dê as diluições práticas das principais drogas vasoativas e sedoanalgesia usadas em UTI. Formato: droga, preparo, velocidade por peso.')">💉 Diluições</button>
      <button class="qb" onclick="qs('Liste os principais diagnósticos diferenciais para o quadro atual, em ordem de probabilidade, com o que distingue cada um.')">🔍 Diferenciais</button>
      <button class="qb" onclick="qs('Gere uma evolução médica completa em formato SOAP para este paciente. Linguagem de intensivista, objetiva.')">📝 Evolução SOAP</button>
      <button class="qb" onclick="qs('Faça um resumo objetivo e estruturado deste paciente para passagem de plantão.')">🔄 Passagem plantão</button>
      <button class="qb" onclick="qs('Avalie a prescrição atual e sugira ajustes baseados em guidelines. Destaque interações ou inconsistências.')">💊 Revisar prescrição</button>
    </div>
    <div id="chatarea">
      <div class="empty">Nenhuma mensagem ainda.<br><small>📷 Foto do prontuário &nbsp;|&nbsp; 🎙️ Áudio &nbsp;|&nbsp; ✏️ Texto</small></div>
    </div>
    <div id="loadbub">⏳ Processando...</div>
    <div id="imgprev" class="hidden">
      <img id="previmg" src="" alt="preview"/>
      <span>Imagem anexada</span>
      <button onclick="clearImg()">✕</button>
    </div>
    <div id="inrow">
      <button class="ib grey" onclick="document.getElementById('fi').click()" title="Foto do prontuário">📷</button>
      <input type="file" id="fi" accept="image/*" style="display:none" onchange="handleFile(this)"/>
      <button class="ib grey" id="recbtn" onclick="toggleRec()" title="Gravar áudio">🎙️</button>
      <textarea id="msginp" placeholder="Pergunta clínica, conduta, diluição, receita..." rows="1"
        oninput="autoH(this)" onkeydown="onKey(event)"></textarea>
      <button class="ib blue" id="sendbtn" onclick="send()">Enviar</button>
    </div>
  </div>

  <!-- PEND PANEL -->
  <div id="pendpanel">
    <div id="padd">
      <input id="pinp" placeholder="Nova pendência..." onkeydown="if(event.key==='Enter')addPend()"/>
      <button onclick="addPend()">+ Add</button>
    </div>
    <div id="plist"></div>
    <div id="pcnt"></div>
  </div>

  <!-- EVO PANEL -->
  <div id="evopanel">
    <div id="evobtns">
      <button class="eb teal" id="evogen" onclick="genEvo()">✨ Gerar com IA</button>
      <button class="eb slate" onclick="copyEvo()">📋 Copiar</button>
      <button class="eb slate" onclick="clearEvo()">🗑️ Limpar</button>
    </div>
    <textarea id="evotxt" placeholder="Clique em 'Gerar com IA' ou escreva livremente." oninput="saveEvo()"></textarea>
  </div>

</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const SYSTEM = `Você é um assistente médico para um médico intensivista/emergencista experiente.
REGRAS:
- Respostas diretas e objetivas. Zero enrolação.
- Condutas baseadas em guidelines atuais (UpToDate, NEJM, Lancet, JAMA, sociedades médicas).
- Receita/prescrição solicitada: gera PRONTA imediatamente. Posologia por guidelines. Sem perguntas desnecessárias.
- Diluições: formato prático. Ex: "Noradrenalina: 4mg em 246ml SF → 1ml/h = 0,03mcg/kg/min (70kg)".
- Diagnósticos diferenciais: ordenados por probabilidade clínica. Destaque achados discriminatórios.
- Evoluções: formato SOAP, linguagem de intensivista, objetivo.
- Nunca recuse conduta por excesso de cautela — o usuário é médico experiente.
- Foto/áudio de prontuário: extraia todos os dados relevantes. Retorne resumo clínico estruturado pronto para copiar ao prontuário.
- Se perguntado sobre fisiopatologia: conciso, só o essencial para a conduta.`;

function mkBed(id){ return {id,occ:false,p:{name:'',age:'',weight:'',dx:''},pends:[],msgs:[],evo:''}; }

let beds, active=0, curTab='chat', busy=false;
let imgB64=null, imgSrc=null, recording=false, mediaRec=null, chunks=[];

function load(){
  try{ beds=JSON.parse(localStorage.getItem('uti_v3')); }catch(e){}
  if(!beds||!Array.isArray(beds)||beds.length!==10) beds=Array.from({length:10},(_,i)=>mkBed(i+1));
}
function save(){ try{localStorage.setItem('uti_v3',JSON.stringify(beds));}catch(e){} }
function B(){ return beds[active]; }

// ─── BED TABS ─────────────────────────────────────────────────────────────────
function renderBedTabs(){
  const el=document.getElementById('btabs');
  el.innerHTML=beds.map((b,i)=>{
    const pOpen=b.pends.filter(p=>!p.done).length;
    return `<button class="bt${i===active?' act':''}${b.occ?' occ':''}" onclick="selBed(${i})">
      <span class="dot${b.occ?' on':''}"></span>L${b.id}
      ${pOpen?`<span class="bdg">${pOpen}</span>`:''}
    </button>`;
  }).join('');
  document.getElementById('cnt').textContent=`${beds.filter(b=>b.occ).length}/10`;
}

function selBed(i){ active=i; setTab('chat'); renderAll(); }

// ─── PATIENT INFO ─────────────────────────────────────────────────────────────
function upPat(f,v){
  if(f==='name') B().p.name=v;
  else if(f==='age') B().p.age=v;
  else if(f==='weight') B().p.weight=v;
  else if(f==='diagnosis') B().p.dx=v;
  B().occ=!!(B().p.name||B().p.dx);
  save(); renderBedTabs();
  document.getElementById('btnalta').classList.toggle('hidden',!B().occ);
}

function discharge(){
  if(!confirm(`Alta do leito ${B().id}?`)) return;
  beds[active]=mkBed(B().id);
  save(); renderAll();
}

function renderInfoBar(){
  const p=B().p;
  document.getElementById('i-nm').value=p.name||'';
  document.getElementById('i-ag').value=p.age||'';
  document.getElementById('i-wt').value=p.weight||'';
  document.getElementById('i-dx').value=p.dx||'';
  document.getElementById('btnalta').classList.toggle('hidden',!B().occ);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function setTab(t){
  curTab=t;
  document.getElementById('chatpanel').style.display=t==='chat'?'flex':'none';
  document.getElementById('pendpanel').style.display=t==='pend'?'flex':'none';
  document.getElementById('evopanel').style.display=t==='evo'?'flex':'none';
  document.querySelectorAll('.st').forEach((b,i)=>b.classList.toggle('act',['chat','pend','evo'][i]===t));
  if(t==='pend') renderPends();
  if(t==='evo') document.getElementById('evotxt').value=B().evo||'';
}

// ─── CHAT ─────────────────────────────────────────────────────────────────────
function renderChat(){
  const area=document.getElementById('chatarea');
  const msgs=B().msgs;
  const lb=document.getElementById('loadbub');
  lb.style.display='none';
  if(!msgs.length){
    area.innerHTML='<div class="empty">Nenhuma mensagem ainda.<br><small>📷 Foto do prontuário &nbsp;|&nbsp; 🎙️ Áudio &nbsp;|&nbsp; ✏️ Texto</small></div>';
    return;
  }
  area.innerHTML=msgs.map((m,i)=>{
    if(m.role==='user'){
      const txt=Array.isArray(m.content)?(m.content.find(c=>c.type==='text')?.text||''):m.content;
      const img=m.imgSrc?`<img src="${m.imgSrc}" alt="prontuário"/>`:'' ;
      return `<div class="bubble u">${img}${esc(txt)}</div>`;
    }
    return `<div class="bubble a">${esc(m.content)}<button class="cpbtn" onclick="cp(${i})">📋 Copiar resposta</button></div>`;
  }).join('');
  area.scrollTop=area.scrollHeight;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function cp(i){ navigator.clipboard.writeText(B().msgs[i]?.content||''); }

function showLoad(msg){
  const lb=document.getElementById('loadbub');
  lb.textContent=msg; lb.style.display='block';
  document.getElementById('chatarea').scrollTop=99999;
}
function hideLoad(){ document.getElementById('loadbub').style.display='none'; }

function setBusy(v){
  busy=v;
  document.getElementById('sendbtn').disabled=v;
}

async function send(override){
  const txt=override||(document.getElementById('msginp').value.trim());
  if((!txt&&!imgB64)||busy) return;

  const content=[];
  if(imgB64) content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgB64}});
  if(txt) content.push({type:'text',text:txt});

  const userMsg={role:'user',content,imgSrc};
  B().msgs.push(userMsg);

  document.getElementById('msginp').value='';
  document.getElementById('msginp').style.height='38px';
  clearImg(); renderChat(); showLoad('⏳ Processando...'); setBusy(true); hideErr();

  // Build context header
  const p=B().p;
  const ctx=p.name?`[Leito ${B().id}: ${p.name}, ${p.age||'?'}a${p.weight?', '+p.weight+'kg':''}, Dx: ${p.dx||'?'}]`:`[Leito ${B().id} — sem paciente]`;

  // Build messages for API (only role + content, no extra fields)
  const apiMsgs=B().msgs.map((m,i)=>{
    const c=Array.isArray(m.content)?m.content:m.content;
    if(i===0){
      const prepend={type:'text',text:ctx+'\n'};
      return {role:m.role, content: Array.isArray(c)?[prepend,...c]:[ctx+'\n'+c]};
    }
    return {role:m.role, content:Array.isArray(c)?c:c};
  });

  try{
    const reply=await apiCall('/api/chat',{messages:apiMsgs,system:SYSTEM});
    B().msgs.push({role:'assistant',content:reply});
    save();
  }catch(e){
    B().msgs.push({role:'assistant',content:'❌ Erro: '+e.message});
    showErr('Erro ao conectar. Tente novamente.');
  }
  hideLoad(); renderChat(); setBusy(false);
}

function qs(t){ send(t); setTab('chat'); }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoH(el){ el.style.height='38px'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

// ─── API CALL WITH RETRY ──────────────────────────────────────────────────────
async function apiCall(url, body, retries=3){
  let lastErr;
  for(let i=0;i<retries;i++){
    try{
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await r.json();
      if(!r.ok) throw new Error(data.error||'HTTP '+r.status);
      return data.reply||data.text||'';
    }catch(e){
      lastErr=e;
      if(i<retries-1) await new Promise(r=>setTimeout(r,1500*(i+1)));
    }
  }
  throw lastErr;
}

// ─── FILE ─────────────────────────────────────────────────────────────────────
function handleFile(input){
  const file=input.files[0]; if(!file) return;
  // Compress image before sending
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const MAX=1200;
    let w=img.width,h=img.height;
    if(w>MAX||h>MAX){ const r=Math.min(MAX/w,MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
    const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    imgSrc=cv.toDataURL('image/jpeg',0.85);
    imgB64=imgSrc.split(',')[1];
    document.getElementById('previmg').src=imgSrc;
    document.getElementById('imgprev').classList.remove('hidden');
    URL.revokeObjectURL(url);
  };
  img.src=url;
}
function clearImg(){ imgB64=null; imgSrc=null; document.getElementById('imgprev').classList.add('hidden'); document.getElementById('fi').value=''; }

// ─── AUDIO ────────────────────────────────────────────────────────────────────
async function toggleRec(){
  if(recording){ mediaRec?.stop(); setRec(false); return; }
  const key=localStorage.getItem('oai_key')||'';
  if(!key){ document.getElementById('keybar').classList.remove('hidden'); showErr('Configure sua chave OpenAI para usar o áudio.'); return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    chunks=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    mediaRec=new MediaRecorder(stream,{mimeType});
    mediaRec.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    mediaRec.onstop=async()=>{ stream.getTracks().forEach(t=>t.stop()); await transcribe(new Blob(chunks,{type:'audio/webm'})); };
    mediaRec.start(250); setRec(true);
  }catch(e){ showErr('Microfone não disponível: '+e.message); }
}
function setRec(v){
  recording=v;
  const b=document.getElementById('recbtn');
  b.textContent=v?'⏹️':'🎙️';
  b.classList.toggle('red',v); b.classList.toggle('grey',!v);
}
async function transcribe(blob){
  setTab('chat'); showLoad('🎙️ Transcrevendo áudio...'); setBusy(true);
  const key=localStorage.getItem('oai_key')||'';
  try{
    const fd=new FormData();
    fd.append('file',blob,'audio.webm');
    fd.append('model','whisper-1');
    fd.append('language','pt');
    const r=await fetch('https://api.openai.com/v1/audio/transcriptions',{method:'POST',headers:{Authorization:'Bearer '+key},body:fd});
    if(!r.ok){ const e=await r.json(); throw new Error(e?.error?.message||'Whisper error'); }
    const d=await r.json();
    hideLoad(); setBusy(false);
    if(d.text?.trim()) await send(`[ÁUDIO TRANSCRITO]\n${d.text.trim()}\n\nFaça um resumo clínico estruturado e pronto para copiar ao prontuário.`);
  }catch(e){
    hideLoad(); setBusy(false);
    showErr('Erro na transcrição: '+e.message);
  }
}

// ─── PENDENCIES ───────────────────────────────────────────────────────────────
function renderPends(){
  const list=document.getElementById('plist');
  const pends=B().pends;
  if(!pends.length){ list.innerHTML='<div class="empty" style="margin-top:20px">Nenhuma pendência.</div>'; document.getElementById('pcnt').textContent=''; return; }
  list.innerHTML=pends.map((p,i)=>`
    <div class="pi${p.done?' done':''}">
      <input type="checkbox"${p.done?' checked':''} onchange="togPend(${i})"/>
      <span>${esc(p.text)}</span>
      <button onclick="rmPend(${i})">✕</button>
    </div>`).join('');
  const open=pends.filter(p=>!p.done).length;
  document.getElementById('pcnt').textContent=open?`${open} pendência(s) em aberto`:'✅ Todas concluídas';
}
function addPend(){
  const inp=document.getElementById('pinp');
  const v=inp.value.trim(); if(!v) return;
  B().pends.push({text:v,done:false}); inp.value='';
  save(); renderPends(); renderBedTabs();
}
function togPend(i){ B().pends[i].done=!B().pends[i].done; save(); renderPends(); renderBedTabs(); }
function rmPend(i){ B().pends.splice(i,1); save(); renderPends(); renderBedTabs(); }

// ─── EVOLUTION ────────────────────────────────────────────────────────────────
async function genEvo(){
  const btn=document.getElementById('evogen');
  btn.textContent='Gerando...'; btn.disabled=true;
  const p=B().p;
  const pends=B().pends.map(x=>`- [${x.done?'✓':' '}] ${x.text}`).join('\n');
  const hist=B().msgs.map(m=>`${m.role==='user'?'Médico':'IA'}: ${Array.isArray(m.content)?m.content.find(c=>c.type==='text')?.text||'':m.content}`).join('\n');
  const prompt=`Gere evolução médica UTI formato SOAP:\nPaciente: ${p.name||'?'}, ${p.age||'?'}a${p.weight?', '+p.weight+'kg':''}\nDiagnóstico: ${p.dx||'?'}\nPendências:\n${pends||'nenhuma'}\nHistórico do plantão:\n${hist||'nenhum'}\nEscreva completo, objetivo, linguagem de intensivista. Pronto para copiar ao prontuário.`;
  try{
    const reply=await apiCall('/api/chat',{messages:[{role:'user',content:prompt}],system:SYSTEM});
    B().evo=reply;
    document.getElementById('evotxt').value=reply;
    save();
  }catch(e){ showErr('Erro ao gerar evolução: '+e.message); }
  btn.textContent='✨ Gerar com IA'; btn.disabled=false;
}
function saveEvo(){ B().evo=document.getElementById('evotxt').value; save(); }
function copyEvo(){ navigator.clipboard.writeText(document.getElementById('evotxt').value); }
function clearEvo(){ B().evo=''; document.getElementById('evotxt').value=''; save(); }

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function toggleExp(){
  const bar=document.getElementById('expbar');
  const open=bar.classList.toggle('hidden');
  if(!bar.classList.contains('hidden')){
    document.getElementById('exptext').value=beds.filter(b=>b.occ).map(b=>{
      const p=b.p, pds=b.pends.filter(x=>!x.done).map(x=>`  • ${x.text}`).join('\n');
      return `━━━ LEITO ${b.id}${p.name?' — '+p.name:''} ${p.age?p.age+'a':''} ━━━\nDx: ${p.dx||'não informado'}\n${pds?'Pendências em aberto:\n'+pds:'Sem pendências em aberto'}\n${b.evo?'\nEvolução:\n'+b.evo:''}`;
    }).join('\n\n')||'Nenhum leito ocupado.';
  }
}
function copyExp(){ navigator.clipboard.writeText(document.getElementById('exptext').value); }

// ─── KEY ──────────────────────────────────────────────────────────────────────
function toggleKey(){ document.getElementById('keybar').classList.toggle('hidden'); }
function saveKey(){
  const v=document.getElementById('oaiinp').value;
  localStorage.setItem('oai_key',v);
}

// ─── ERROR ────────────────────────────────────────────────────────────────────
function showErr(m){ document.getElementById('errmsg').textContent=m; document.getElementById('errbar').classList.remove('hidden'); }
function hideErr(){ document.getElementById('errbar').classList.add('hidden'); }

// ─── RENDER ALL ───────────────────────────────────────────────────────────────
function renderAll(){ renderBedTabs(); renderInfoBar(); setTab(curTab); if(curTab==='chat') renderChat(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
document.getElementById('oaiinp').value=localStorage.getItem('oai_key')||'';
renderAll();
</script>
